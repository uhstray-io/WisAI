# Multi-node deployment: Open WebUI routing to multiple Ollama nodes
#
# Deploy docker-compose.yml on EACH GPU node (the Ollama instances).
# Deploy THIS file on a coordinator node (or any node) to run Open WebUI
# with load balancing across all nodes.
#
# Set OLLAMA_NODES in .env to your node IPs before starting:
#   OLLAMA_NODES=http://192.168.1.10:11434;http://192.168.1.11:11434
#
# Usage (coordinator node only):
#   docker compose -f docker-compose.multi.yml up -d
#
# Open WebUI distributes requests across all configured Ollama backends.
# Each node runs its own model independently — no shared VRAM.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      # Semicolon-separated Ollama endpoints — Open WebUI round-robins across them.
      - OLLAMA_BASE_URL=${OLLAMA_NODES}

volumes:
  open-webui-data:
