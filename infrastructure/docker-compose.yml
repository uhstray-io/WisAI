# Single-node deployment: Ollama + Open WebUI
#
# Usage:
#   cp .env.example .env        # configure once
#   docker compose up -d        # start services
#   docker compose down         # stop services
#
# Ollama API:  http://<vm-ip>:${OLLAMA_PORT}
# Open WebUI:  http://<vm-ip>:${WEBUI_PORT}

services:
  ollama:
    image: ollama/ollama:0.20.6  # pinned 2026-04-13 — to upgrade: bump tag, docker compose pull, docker compose up -d
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ${MODELS_PATH:-ollama-data}:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
    # GPU access — pick ONE section based on your runtime:
    #
    # Docker + NVIDIA Container Toolkit (Linux/Proxmox target):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    #
    # Podman + CDI (Windows/WSL2 — requires nvidia-container-toolkit + CDI spec in Podman machine):
    devices:
      - nvidia.com/gpu=all
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12  # pinned 2026-04-13 — to upgrade: bump tag, docker compose pull, docker compose up -d
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  # Only created when MODELS_PATH is unset; ignored otherwise.
  ollama-data:
  open-webui-data:
